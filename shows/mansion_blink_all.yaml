# Blinks all 14 mansion lights on/off together. Self-contained (no tokens).

- time: 0
  lights:
    led_mansion_1: white
    led_mansion_2: white
    led_mansion_3: white
    led_mansion_4: white
    led_mansion_5: white
    led_mansion_6: white
    led_mansion_7: white
    led_mansion_8: white
    led_mansion_9: white
    led_mansion_10: white
    led_mansion_11: white
    led_mansion_12: white
    led_mansion_13: white
    led_mansion_14: white
- time: '+1'
  lights:
    led_mansion_1: 'off'
    led_mansion_2: 'off'
    led_mansion_3: 'off'
    led_mansion_4: 'off'
    led_mansion_5: 'off'
    led_mansion_6: 'off'
    led_mansion_7: 'off'
    led_mansion_8: 'off'
    led_mansion_9: 'off'
    led_mansion_10: 'off'
    led_mansion_11: 'off'
    led_mansion_12: 'off'
    led_mansion_13: 'off'
    led_mansion_14: 'off'
