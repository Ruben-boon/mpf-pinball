#config_version=6

##! mode: three_million
# Mansion window (led_mansion_10). No objective: on start, wait 3s then auto-complete
# (three_million_complete) -> scores 3,000,000 and mansion records the room DONE.
# The completion CALLOUT (taf_3_million) is played from the always-on base mode, NOT
# here: this mode stops on three_million_complete, and a sound started by a mode that
# is tearing down on the same event gets cut off immediately.
mode:
  start_events: start_mode_three_million
  stop_events: three_million_complete, ball_will_end
  priority: 200

event_player:
  # Auto-complete 3s after the scoop starts the mode.
  mode_three_million_started:
    three_million_complete:
      delay: 3s

variable_player:
  three_million_complete:
    score: 3000000
