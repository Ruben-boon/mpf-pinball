#config_version=6

##! mode: base
mode:
  start_events: ball_starting
  priority: 250

counters:
  right_ramp_counter:
    starting_count: 0
    start_enabled: true
    persist_state: true
    reset_on_complete: false
    count_events: right_ramp_hit
  top_loop_counter:
    starting_count: 0
    count_events: top_loop_hit
    start_enabled: true
    persist_state: true
    reset_on_complete: false

sequence_shots:
  shot_right_ramp:
    switch_sequence: s_right_ramp_entry, s_ramp_top
    sequence_timeout: 3s
  shot_left_ramp:
    switch_sequence: s_left_ramp_entry, s_ramp_top
    sequence_timeout: 3s
  shot_top_loop:
    switch_sequence: s_top_loop_entry, s_upper_right_loop
    sequence_timeout: 3s
  shot_left_orbit:
    switch_sequence: s_upper_left_loop, s_upper_right_loop
    sequence_timeout: 3s
  shot_right_orbit:
    switch_sequence: s_upper_right_loop, s_upper_left_loop
    sequence_timeout: 3s


shots:
