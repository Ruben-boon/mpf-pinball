#config_version=6

##! mode: center_scoop_lit
# The center scoop is the heart of the game: shoot it (while PLUGGED IN and lit)
# to START the next mansion mode. Starting a mode UNPLUGS the scoop (light off);
# it must be re-plugged by hitting the bear / main ramp (s_right_ramp_entry)
# before it can start the next mode. Shooting it while unplugged just plays the
# "it's not plugged in yet" callout.
#
# Runs the whole ball so it can always arbitrate scoop hits.
mode:
  priority: 1002
  start_events: ball_starting
  stop_events: ball_will_end

shots:
  shot_center_scoop:
    switch: s_center_scoop

variable_player:
  mode_center_scoop_lit_started:
    scoop_plugged: {int: 1, action: set}
  # Starting a mode unplugs the scoop.
  start_mode_three_million:
    scoop_plugged: {int: 0, action: set}
  start_mode_six_million:
    scoop_plugged: {int: 0, action: set}
  start_mode_nine_million:
    scoop_plugged: {int: 0, action: set}
  start_mode_orbit:
    scoop_plugged: {int: 0, action: set}
  # Bear / main ramp re-plugs the scoop (only meaningful while unplugged).
  scoop_replugged:
    scoop_plugged: {int: 1, action: set}

event_player:
  # Bear / main ramp re-plugs the scoop, but only while unplugged.
  s_right_ramp_entry_active{current_player.scoop_plugged==0}:
    - scoop_replugged

  # --- delayed eject ------------------------------------------------------
  # The ball lands in the scoop -> eject after a delay that depends on plugged
  # state: 4s when PLUGGED (a mansion mode starts and runs its 3s award), 2s when
  # UNPLUGGED (just the "not plugged in" callout, then kick it back out).
  s_center_scoop_active{current_player.scoop_plugged==1}:
    eject_center_scoop:
      delay: 4s
  s_center_scoop_active{current_player.scoop_plugged==0}:
    eject_center_scoop:
      delay: 2s

  # --- scoop hit arbitration ---------------------------------------------
  # PLUGGED + a mode is pending → start that mode.
  shot_center_scoop_hit{current_player.scoop_plugged==1 and current_player.next_mode=="three"}:
    - start_mode_three_million
  shot_center_scoop_hit{current_player.scoop_plugged==1 and current_player.next_mode=="six"}:
    - start_mode_six_million
  shot_center_scoop_hit{current_player.scoop_plugged==1 and current_player.next_mode=="nine"}:
    - start_mode_nine_million
  shot_center_scoop_hit{current_player.scoop_plugged==1 and current_player.next_mode=="orbit"}:
    - start_mode_orbit
  # PLUGGED but nothing left to start → nothing happens (all windows marked).
  # UNPLUGGED → "not plugged in" callout.
  shot_center_scoop_hit{current_player.scoop_plugged==0}:
    - center_scoop_not_plugged

light_player:
  # Lit (red) whenever plugged; off when unplugged.
  mode_center_scoop_lit_started:
    led_center_scoop: red
  scoop_replugged:
    led_center_scoop: red
  start_mode_three_million:
    led_center_scoop: off
  start_mode_six_million:
    led_center_scoop: off
  start_mode_nine_million:
    led_center_scoop: off
  start_mode_orbit:
    led_center_scoop: off

sound_player:
  # Capture sound only when PLUGGED (a mansion mode is actually being started).
  s_center_scoop_active{current_player.scoop_plugged==1}:
    taf_mansion_1:
      action: play
  center_scoop_not_plugged:
    taf_not_plugged_in:
      action: play
