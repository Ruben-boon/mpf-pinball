#config_version=6

mpf:
  report_crashes: never

config:
  - hardware.yaml
  - switches.yaml
  - coils.yaml
  - lights.yaml
  - devices.yaml
  - images.yaml
  - displays.yaml
  - slides.yaml
  - sounds.yaml

modes:
  - base
  - attract
  - five_million
  - left_orbit
  - mansion
  - center_scoop_lit
  # default rules (active by default; disabled during multiball / focus modes)
  - million_ramp
  - bear_kick
  - swamp
  - swamp_kickout
  - graveyard_jets
  - grave_letters
  - inlanes
  - orbit_left
  - orbit_right
  - jump_shot

sound_system:
  tracks:
    music:
      type: standard
      simultaneous_sounds: 1
      volume: 0.5
    voice:
      type: standard
      simultaneous_sounds: 1
      volume: 0.7
    sfx:
      type: standard
      simultaneous_sounds: 8
      volume: 0.4
    # looping gameplay theme rotation
    music_playlist:
      type: playlist
      volume: 0.5
      crossfade_time: 2s

assets:
  sounds:
    default:
      load: on_demand
    music:
      track: music
    sfx:
      track: sfx
    voice:
      track: voice
    taf_remastered:
      track: sfx

playfields:
  playfield:
    tags: default
    default_source_device: bd_trough

