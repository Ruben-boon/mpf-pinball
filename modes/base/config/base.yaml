event_player:
  # Post a one-shot start event on the FIRST playfield_active of each ball.
  # The flag guard prevents re-firing when the ball returns to the playfield.
  playfield_active{not current_player.themes_started}: start_gameplay_music

variable_player:
  # switch hits
  s_pop1_active:
    score: 200
  s_pop2_active:
    score: 200
  s_pop3_active:
    score: 200
  s_pop4_active:
    score: 200
  s_pop5_active:
    score: 200

  s_left_slingshot_active:
    score: 50
  s_right_slingshot_active:
    score: 50

  s_it_hole_active:
    score: 200

  #shot hits
  shot_right_ramp_hit:
    score: 100
  shot_right_scoop_hit:
    score: 100

  # flag so the theme playlist only starts once per ball
  mode_base_started:
    themes_started:
      int: 0
      action: set
    # Default-rule suppression flag (owned here in always-on base mode).
    # While 1, the default-rule modes (million_ramp, bear_kick, swamp,
    # swamp_kickout, graveyard_jets, grave_letters) ignore their scoring events.
    # The modes keep RUNNING so their state (lit GRAVE letters, ramp value, etc.)
    # is preserved -- a focus mode / multiball just sets/clears this flag.
    default_rules_off:
      int: 0
      action: set
  disable_default_modes:
    default_rules_off: {int: 1, action: set}
  enable_default_modes:
    default_rules_off: {int: 0, action: set}
  # set after the one-shot start event fires (see event_player below)
  start_gameplay_music:
    themes_started:
      int: 1
      action: set

show_player:
  s_pop1_active:
    led_gy:
      show: led_gy_blink
      loops: 0
  s_pop2_active:
    led_gy:
      show: led_gy_blink
      loops: 0
  s_pop3_active:
    led_gy:
      show: led_gy_blink
      loops: 0
  s_pop4_active:
    led_gy:
      show: led_gy_blink
      loops: 0
  s_pop5_active:
    led_gy:
      show: led_gy_blink
      loops: 0
  s_left_slingshot_active:
    led_gy:
      show: led_sling_blink
      loops: 0
  s_right_slingshot_active:
    led_gy:
      show: led_sling_blink
      loops: 0

slide_player:
  mode_base_started:
    widgets:
      - type: text
        text: (score)
        number_grouping: true
        min_digits: 2
        font_name: pixelmix
        font_size: 12
        color: orange
        y: middle
        x: center
      - type: text
        text: P(number)
        y: 1
        x: 2
        font_name: pixelmix
        font_size: 7
        color: orange
        anchor_x: left
        anchor_y: bottom
      - type: text
        text: B(ball)
        y: 1
        x: 126
        anchor_x: right
        anchor_y: bottom
        font_name: pixelmix
        font_size: 7
        color: orange

light_player:
  mode_base_started:
    led_gi_left_ball_guide_1: blue
    led_gi_left_ball_guide_2: blue
    led_gi_left_ball_guide_3: blue
    led_gi_right_ball_guide_1: blue
    led_gi_right_ball_guide_2: blue
    led_gi_right_slingshot: blue
    led_gi_left_slingshot: blue
    led_gi_pops: white
    led_gi_grtargets: white
    led_gi_smallflip: white

  mode_base_ended:
    led_gi_left_ball_guide_1: off
    led_gi_left_ball_guide_2: off
    led_gi_left_ball_guide_3: off
    led_gi_right_ball_guide_1: off
    led_gi_right_ball_guide_2: off
    led_gi_right_slingshot: off
    led_gi_left_slingshot: off
    led_gi_pops: off
    led_gi_grtargets: off
    led_gi_smallflip: off

sound_player:
  #music
  mode_base_started:
    music_startuplong:
      action: stop
      fade_out: 0s
    taf_prelaunch:
      action: play
    # Welcome callout on the voice track, layered over the music.
    # Owned by base mode so it plays in full and isn't cut off.
    # taf_welcome is a random pool: alternates welcome_back / welcome_guest.
    taf_welcome:
      action: play

  playfield_active:
    # gameplay theme rotation is started by playlist_player (config/sounds.yaml)
    taf_prelaunch:
      action: stop
      fade_out: 1s
  #sfx on hit
  s_left_slingshot_active:
    taf_rebound_3:
      action: play

  s_right_slingshot_active:
    taf_rebound_4:
      action: play

  s_pop1_active:
    taf_pop:
      action: play
  s_pop2_active:
    taf_pop:
      action: play
  s_pop3_active:
    taf_pop:
      action: play
  s_pop4_active:
    taf_pop:
      action: play
  s_pop5_active:
    taf_pop:
      action: play

  # previously-silent base shots
  s_it_hole_active:
    taf_thing_fx:
      action: play
  shot_right_scoop_hit:
    taf_scoop:
      action: play
  # center scoop capture
  s_center_scoop_active:
    taf_mansion_1:
      action: play
  # main ramp entry switch — bear roar
  s_right_ramp_entry_active:
    taf_bear:
      action: play
  # secondary left ramp entry (s_left_ramp_entry) — intentionally no sound
  # both completed ramp sequences play the ramp loop
  shot_left_ramp_hit:
    taf_ramp_loop:
      action: play
  shot_right_ramp_hit:
    taf_ramp_loop:
      action: play
  # eject lane switch — always fires
  s_eject_lane_active:
    taf_space_19:
      action: play
  # upper loop switches — always fire (distinct sounds)
  s_upper_right_loop_active:
    taf_motor_3:
      action: play
  s_upper_left_loop_active:
    taf_space_19:
      action: play