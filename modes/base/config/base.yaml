#config_version=6

##! mode: base
mode:
  start_events: ball_starting
  stop_events: ball_will_end 

  priority: 100

slide_player:
  mode_base_started:
    widgets:
      - type: text
        text: (score)
        number_grouping: true
        min_digits: 2
        font_size: 200
        font_name: MetalMania-Regular.ttf
      - type: text
        text: PLAYER (number)
        y: 10
        x: 10
        font_size: 50
        font_name: MetalMania-Regular.ttf
        anchor_x: left
        anchor_y: bottom
      - type: text
        text: BALL (ball)
        y: 10
        x: right-10
        anchor_x: right
        anchor_y: bottom
        font_size: 50
        font_name: MetalMania-Regular.ttf
      - type: image
        image: gy_v3
        x: center
        y: middle

light_player:
  mode_base_started:
    led_gi_left_ball_guide_1: white
    led_gi_left_ball_guide_2: white
    led_gi_left_ball_guide_3: white
    led_gi_right_ball_guide_1: white
    led_gi_right_ball_guide_2: white
    led_gi_right_slingshot: white
    led_gi_left_slingshot: white

  mode_base_ended:
    led_gi_left_ball_guide_1: white
    led_gi_left_ball_guide_2: white
    led_gi_left_ball_guide_3: white
    led_gi_right_ball_guide_1: white
    led_gi_right_ball_guide_2: white
    led_gi_right_slingshot: white
    led_gi_left_slingshot: white
