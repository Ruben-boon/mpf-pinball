    track: voice
  taf_start_orbit:
    file: 0x7a1d-straight_to_the_vault.wav
    track: voice

sound_pools:
  # Picks one of the welcome callouts at random each time it's played
  taf_welcome:
    track: voice
    type: random
    sounds:
      - taf_welcome_back
      - taf_welcome_guest

  # pop bumper hit — random ha/ho/hu laugh
  taf_pop:
    track: sfx
    type: random
    sounds:
      - taf_haho_1
      - taf_haho_2
      - taf_haho_3
      - taf_haho_4
      - taf_haho_5
      - taf_haho_6
      - taf_haho_7
      - taf_haho_8
      - taf_haho_9
      - taf_haho_10
      - taf_haho_11

  # grave target hit — random ting (dedicated to targets)
  taf_target:
    track: sfx
    type: random
    sounds:
      - taf_ting_1
      - taf_ting_2
      - taf_ting_3
      - taf_ting_4

  # ramp hit — random rebound (dedicated to ramps)
  taf_ramp:
    track: sfx
    type: random
    sounds:
      - taf_rebound_1
      - taf_rebound_2

  # orbit hit — random whistle (dedicated to orbits)
  taf_orbit:
    track: sfx
    type: random
    sounds:
      - taf_whistle_1
      - taf_whistle_2
      - taf_whistle_3

  # base scoop hit — random combo (dedicated to scoop)
  taf_scoop:
    track: sfx
    type: random
    sounds:
      - taf_combo_1
      - taf_combo_2
      - taf_combo_3

playlists:
  # Gameplay theme rotation: plays each theme, then the next, and loops the
  # whole list forever (repeat: True). 2s crossfade between themes.
  gameplay_themes:
    sounds: taf_theme_1, taf_theme_2, taf_theme_3, taf_theme_4, taf_theme_5, taf_theme_6
    shuffle: False
    repeat: True
    crossfade_time: 2s

playlist_player:
  # Started once per ball via the start_gameplay_music one-shot event (base mode
  # event_player guards it with the themes_started flag so it won't restart when
  # the ball re-enters the playfield).
  # key under the event is the TRACK name (music_playlist); 'playlist:' names the playlist.
  start_gameplay_music:
    music_playlist:
      playlist: gameplay_themes
      action: play
  # stop it when the ball ends
  ball_will_end:
    music_playlist:
      action: stop
