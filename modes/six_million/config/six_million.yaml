#config_version=6

##! mode: six_million
# Mansion window (led_mansion_6). No objective: on start, wait 3s then auto-complete
# (six_million_complete) -> scores 6,000,000 and mansion records the room DONE.
# The completion CALLOUT (taf_6_million) is played from the always-on base mode, NOT
# here (this mode stops on six_million_complete; an in-mode sound would be cut off).
mode:
  start_events: start_mode_six_million
  stop_events: six_million_complete, ball_will_end
  priority: 200

event_player:
  # Auto-complete 3s after the scoop starts the mode.
  mode_six_million_started:
    six_million_complete:
      delay: 3s

variable_player:
  six_million_complete:
    score: 6000000
